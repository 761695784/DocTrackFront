<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">
      <img src="/assets/logoo2.png" alt="Logo">
    </div>
    <div class="sb-logo-text">
      <span class="sb-logo-name">DocTrack</span>
    </div>
  </div>

  <nav class="sb-nav">
    <div class="sb-section">
      <span class="sb-section-label">Principal</span>
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="sb-item">
        <div class="sb-icon"><i class="fas fa-home"></i></div>
        <span>Accueil</span>
      </a>
      <a routerLink="/admin/adminpub" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-newspaper"></i></div>
        <span>Publications</span>
      </a>
      <a routerLink="/admin/admindec" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-file-alt"></i></div>
        <span>Déclarations</span>
      </a>
      <a routerLink="/admin/admincertif" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-certificate"></i></div>
        <span>Certificats</span>
      </a>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-section">
      <span class="sb-section-label">Gestion</span>
      <a routerLink="/admin/adminuser" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-users"></i></div>
        <span>Utilisateurs</span>
      </a>
      <a routerLink="/admin/adminstats" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-chart-bar"></i></div>
        <span>Statistiques</span>
      </a>
      <a routerLink="/admin/adminlogs" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-history"></i></div>
        <span>Journal d'activités</span>
      </a>
      <a routerLink="/admin/adminbackup" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-database"></i></div>
        <span>Sauvegardes</span>
      </a>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-section">
      <span class="sb-section-label">Compte</span>
      <a routerLink="/admin/profil" routerLinkActive="active" class="sb-item">
        <div class="sb-icon"><i class="fas fa-user"></i></div>
        <span>Mon Profil</span>
      </a>
    </div>
  </nav>

  <div class="sb-bottom">
    <div class="sb-user">
      <div class="sb-user-info">
        <div class="sb-user-role">Administrateur</div>
      </div>
        <i class="fas fa-sign-out-alt"></i>
      </div>
    </div>
  </div>
